<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delta Store</title>

<link href="https://fonts.googleapis.com/css2?family=Odor+Mean+Chey&family=Nunito+Sans&family=Madimi+One&family=Mouse+Memoirs&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/index/style.css">

</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <img src="/assets/logo intro.png" class="loading-logo">
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="logo">
      <img src="/assets/logo intro.png">
      <span>Delta Store</span>
    </div>

    <div class="search-cart">

      <div class="search-box">
        <input type="text" id="searchBar" placeholder="Cari...">
        <span class="clear-btn" id="clearSearch">✕</span>
        <div id="searchResults"></div>
      </div>

      <div class="cart" id="cart">
        🛒 <span id="cart-count">0</span>
      </div>

    </div>

  </div>

  <!-- APLIKASI PREMIUM -->
  <div class="section-title">Aplikasi Premium</div>

  <div class="premium-grid" id="appList">

    <div class="card netflix">
      <a href="/netflix/netflix.html" class="app-card">
        <img src="/assets/netflix.png">
        <span>Netflix</span>
      </a>
    </div>

    <div class="card spotify">
      <a href="/spotify/spotify.html" class="app-card">
        <img src="/assets/spotify.png">
        <span>Spotify</span>
      </a>
    </div>

    <div class="card capcut">
      <a href="/capcut/capcut.html" class="app-card">
        <img src="/assets/capcut.png">
        <span>Capcut</span>
      </a>
    </div>

    <div class="card alight">
      <a href="/alight/alight.html" class="alight-icon">
        <img src="/assets/alight.png">
        <span>Alightmotion</span>
      </a>
    </div>

    <div class="card youtube">
      <a href="/youtube/youtube.html" class="app-card">
        <img src="/assets/youtube.png">
        <span>Youtube</span>
      </a>
    </div>

    <div class="card tiktok">
      <a href="/tiktok/tiktok.html" class="app-card">
        <img src="/assets/tiktok.png">
        <span>Tiktok</span>
      </a>
    </div>

  </div>

  <!-- TOP UP GAMES -->
  <div class="section-title">Top up Games</div>

  <div class="game-grid">

    <a href="/ml/ml.html" class="game-card blue">
      <img src="/assets/ml.png">
      <span>Mobile Legends</span>
    </a>

    <a href="/ff/ff.html" class="game-card red">
      <img src="/assets/ff.png">
      <span>Free Fire</span>
    </a>

  </div>

  <!-- SOSIAL MEDIA -->
  <div class="section-title">Sosial Media</div>

  <div class="social-grid">

    <a href="https://www.instagram.com/delta.pointgamers/" target="_blank" class="social-card instagram">
      <img src="/assets/instagram.png">
      <span>Instagram</span>
    </a>

    <a href="https://www.tiktok.com/@deltapoint.gamers" target="_blank" class="social-card tiktok">
      <img src="/assets/tiktok.png">
      <span>Tiktok</span>
    </a>

    <a href="https://wa.me/6281770281646" target="_blank" class="social-card whatsapp">
      <img src="/assets/wa.png">
      <span>WhatsApp</span>
    </a>

  </div>

</div>

<script src="/cart.js"></script>
<script src="/index/index.js"></script>
<script src="/search.js"></script>

</body>
</html>
